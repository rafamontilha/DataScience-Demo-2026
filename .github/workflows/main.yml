name: Python application test with Github Actions

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4  # Atualizado para v4 (usa Node moderno)

    - name: Set up Python 3.10
      uses: actions/setup-python@v5  # Atualizado para v5 (usa Node moderno)
      with:
        python-version: '3.10'  # Mudamos para 3.10, que está disponível no servidor

    - name: Install dependencies
      run: |
        make install

    - name: Test with pytest
      run: |
        make test
